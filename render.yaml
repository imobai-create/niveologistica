services:
  - type: web
    name: rastro-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: DATABASE_URL
        sync: false           # cole a URL do Supabase no dashboard (sslmode=require)
      - key: ANTHROPIC_API_KEY
        sync: false           # chave da Anthropic, opcional para o /agente
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: CORS_ORIGINS
        sync: false           # ex.: https://rastro.vercel.app,https://app.seudominio.com
